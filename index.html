<!DOCTYPE html>
<html lang="en">

<head>
    <load src="/src/components/head-common.html" />
    
    <meta name="description" content="Nhywyll - VTuber Streamer, NeoTech Player & Chicken Lover. Join the community for modded Minecraft survival, Silkies, and cozy gaming.">
    <meta name="keywords" content="VTuber, streamer, modded Minecraft, NeoTech, Silkies, Chicken Lover, Twitch, YouTube, Nhywyll">
    <link rel="canonical" href="https://nhywyll.com/">

    <!-- Social Media Previews (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nhywyll.com/">
    <meta property="og:title" content="Nhywyll - VTuber & Streamer">
    <meta property="og:description" content="Join Nhywyll's community for modded Minecraft survival, NeoTech adventures, and cozy gaming vibes.">
    <meta property="og:image" content="https://nhywyll.com/images/Logo.webp">

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="images/For pfp.webp" type="image/webp">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "mainEntity": {
        "@type": "Person",
        "name": "Nhywyll",
        "alternateName": "Nhywyll VTuber",
        "description": "Nhywyll - VTuber Streamer, modded Minecraft survivalist and Silkie lover.",
        "image": "https://nhywyll.com/images/Logo.webp",
        "sameAs": [
          "https://twitch.tv/nhywyll",
          "https://youtube.com/@nhywyll",
          "https://bsky.app/profile/nhywyll.bsky.social",
          "https://twitter.com/nhywyll",
          "https://www.tiktok.com/@nhywyll"
        ],
        "url": "https://nhywyll.com/"
      }
    }
    </script>
    <title data-i18n="page_title">Nhywyll - VTuber Streamer & Content Creator</title>
</head>

<body>
    <load src="/src/components/header.html" />

    <main id="main-content" tabindex="-1">
        <section class="hero-section entrance-animate">
            <div class="hero-content">
                <div class="hero-text">
                    <h1 class="hero-title entrance-animate stagger-1" data-i18n="page_title">page_title</h1>
                    <p class="hero-subtitle entrance-animate stagger-2" data-i18n="hero_subtitle">hero_subtitle</p>
                    <div class="hero-badges entrance-animate stagger-3">
                        <span class="badge" data-i18n="hero_badge_pronouns">hero_badge_pronouns</span>
                        <span class="badge" data-i18n="hero_badge_gamer">hero_badge_gamer</span>
                        <span class="badge" data-i18n="hero_badge_chicken">hero_badge_chicken</span>
                    </div>
                </div>
                <div class="hero-image-wrap" style="flex-shrink: 0;">
                    <img src="images/For pfp.webp" alt="Nhywyll - VTuber - Content Creator" class="hero-image"
                        loading="eager" fetchpriority="high" width="320" height="380">
                    <div class="image-glow"></div>
                </div>
            </div>
        </section>

        <section class="about-content entrance-animate" style="animation-delay: 0.2s;">
            <div class="about-text">
                <img src="images/artwork-library/VGen_Mel Smol Bean (2).webp" alt="Smol Bean by Melumii"
                    class="smol-bean-img" width="220" height="220" loading="lazy">
                <h2 data-i18n="who_i_am_title">who_i_am_title</h2>
                <p data-i18n="who_i_am_text1">who_i_am_text1</p>
                <p data-i18n="who_i_am_text2">who_i_am_text2</p>
            </div>
        </section>

        <section class="faq-section" style="animation-delay: 0.4s;">
            <div class="faq-container">
                <div class="title-with-emote">
                    <img src="images/Emotes/confused.webp" alt="Confused FAQ" class="inline-emote faq-emote" width="60" height="60" loading="lazy">
                    <h2 data-i18n="faq_title" class="section-title" style="margin-bottom:0;">faq_title</h2>
                </div>
                <div class="faq-grid">
                    <div class="faq-card">
                        <button class="faq-header" type="button" aria-expanded="false" aria-controls="faq-a1">
                            <h3 data-i18n="faq_q1">faq_q1</h3>
                            <span class="faq-icon" aria-hidden="true">+</span>
                        </button>
                        <div class="faq-content" id="faq-a1">
                            <p data-i18n="faq_a1">faq_a1</p>
                        </div>
                    </div>
                    <div class="faq-card">
                        <button class="faq-header" type="button" aria-expanded="false" aria-controls="faq-a2">
                            <h3 data-i18n="faq_q2">faq_q2</h3>
                            <span class="faq-icon" aria-hidden="true">+</span>
                        </button>
                        <div class="faq-content" id="faq-a2">
                            <p data-i18n="faq_a2">faq_a2</p>
                        </div>
                    </div>
                    <div class="faq-card">
                        <button class="faq-header" type="button" aria-expanded="false" aria-controls="faq-a3">
                            <h3 data-i18n="faq_q3">faq_q3</h3>
                            <span class="faq-icon" aria-hidden="true">+</span>
                        </button>
                        <div class="faq-content" id="faq-a3">
                            <p data-i18n="faq_a3">faq_a3</p>
                        </div>
                    </div>
                    <div class="faq-card">
                        <button class="faq-header" type="button" aria-expanded="false" aria-controls="faq-a4">
                            <h3 data-i18n="faq_q4">faq_q4</h3>
                            <span class="faq-icon" aria-hidden="true">+</span>
                        </button>
                        <div class="faq-content" id="faq-a4">
                            <p data-i18n="faq_a4">faq_a4</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <load src="/src/components/footer.html" />
</body>

</html>
